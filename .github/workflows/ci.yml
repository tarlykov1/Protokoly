name: CI

on:
  push:
    branches:
      - work
      - feature/protocol-editor
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: protocol_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d protocol_management_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/protocol_management_test
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check .

      - name: Run pytest
        run: pytest -q

      - name: Apply and inspect migrations
        run: |
          alembic upgrade head
          alembic current
          alembic heads

      - name: Check application import
        run: python -c "import app.main; print('import ok')"

      - name: Start application
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/protocol-management.log 2>&1 &
          echo $! > /tmp/protocol-management.pid

      - name: Wait for application
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/protocol-management.log
          exit 1

      - name: Check HTTP pages
        run: |
          curl --fail --silent http://127.0.0.1:8000/health
          curl --fail --silent http://127.0.0.1:8000/ > /dev/null
          curl --fail --silent http://127.0.0.1:8000/projects > /dev/null
          curl --fail --silent http://127.0.0.1:8000/protocols > /dev/null

      - name: Stop application
        if: always()
        run: |
          if [ -f /tmp/protocol-management.pid ]; then
            kill "$(cat /tmp/protocol-management.pid)" || true
          fi
