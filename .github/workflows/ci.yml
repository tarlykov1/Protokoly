name: CI

on:
  push:
    branches:
      - work
      - feature/protocol-editor
      - feature/demo-mvp
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: protocol_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d protocol_management_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/protocol_management_test
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Wait for PostgreSQL
        run: |
          for attempt in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d protocol_management_test && exit 0
            sleep 1
          done
          exit 1

      - name: Run Ruff
        run: ruff check .

      - name: Apply migrations
        run: alembic upgrade head

      - name: Show current migration
        run: alembic current

      - name: Show migration heads
        run: alembic heads

      - name: Run pytest
        run: pytest -q

      - name: Check application import
        run: python -c "import app.main; print('import ok')"

      - name: Start application
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/protocol-management.log 2>&1 &
          echo $! > /tmp/protocol-management.pid

      - name: Wait for application
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/protocol-management.log
          exit 1

      - name: Check HTTP pages
        run: |
          curl --fail --silent http://127.0.0.1:8000/health > /dev/null
          curl --fail --silent http://127.0.0.1:8000/ > /dev/null
          curl --fail --silent http://127.0.0.1:8000/demo > /dev/null
          curl --fail --silent http://127.0.0.1:8000/demo/dashboard > /dev/null
          curl --fail --silent http://127.0.0.1:8000/protocols > /dev/null
          curl --fail --silent http://127.0.0.1:8000/protocols/import > /dev/null
          curl --fail --silent http://127.0.0.1:8000/protocols/imports > /dev/null
          curl --fail --silent http://127.0.0.1:8000/publication-runs > /dev/null

      - name: Stop application
        if: always()
        run: |
          if [ -f /tmp/protocol-management.pid ]; then
            kill "$(cat /tmp/protocol-management.pid)" || true
          fi


  deployment-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Prepare demo env
        run: |
          cp .env.example .env
          sed -i 's/change-me-generate-with-openssl-rand-hex-32/ci-secret-key-for-demo-deployment-tests/' .env
          sed -i 's/https:\/\/demo.example.ru/http:\/\/localhost/' .env
          sed -i 's/demo.example.ru,localhost,127.0.0.1/localhost,127.0.0.1,testserver/' .env
      - name: Validate compose
        run: docker compose -f docker-compose.demo.yml --env-file .env config
      - name: Build runtime image
        run: docker compose -f docker-compose.demo.yml --env-file .env build app
      - name: Start database and migrate
        run: |
          docker compose -f docker-compose.demo.yml --env-file .env up -d db
          docker compose -f docker-compose.demo.yml --env-file .env run --rm app alembic upgrade head
      - name: Seed demo
        run: docker compose -f docker-compose.demo.yml --env-file .env run --rm app python -m app.cli.seed_demo
      - name: Start app and smoke test
        run: |
          docker compose -f docker-compose.demo.yml --env-file .env up -d app nginx
          BASE_URL=http://localhost ./scripts/smoke-test.sh
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.demo.yml --env-file .env down -v
