services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
  app:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-0.5.0-demo}
        GIT_COMMIT: ${GIT_COMMIT:-local}
        BUILD_DATE: ${BUILD_DATE:-local}
    restart: unless-stopped
    env_file: .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    command: >
      sh -c 'gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers $${WEB_CONCURRENCY:-2} --bind 0.0.0.0:8000 --timeout 120 --access-logfile - --error-logfile -'
    volumes:
      - uploads:/app/uploads
      - generated_docx:/app/data/generated-docx
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 5
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-20}
      DEMO_BASIC_AUTH_ENABLED: ${DEMO_BASIC_AUTH_ENABLED:-true}
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/auth:/etc/nginx/auth:ro
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
  uploads:
  generated_docx:
