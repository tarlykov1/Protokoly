{% extends "base.html" %}{% block content %}<h1>Редактирование поручения</h1><form method="post"><label>Номер</label><input class="form-control" name="number" value="{{ task.number }}"><label>Раздел</label><select class="form-select" name="section_id">{% for s in sections %}<option value="{{ s.id }}" {% if task.section_id==s.id %}selected{% endif %}>{{ s.title }}</option>{% endfor %}</select><label>Название</label><input class="form-control" name="title" value="{{ task.title }}"><label>Описание</label><textarea class="form-control" name="description">{{ task.description or '' }}</textarea><label>Критерии приёмки</label><textarea class="form-control" name="acceptance_criteria">{{ task.acceptance_criteria or '' }}</textarea><label>Срок</label><input class="form-control" type="date" name="deadline" value="{{ task.deadline or '' }}"><label>Тип срока</label><input class="form-control" value="абсолютный"><label>Приоритет</label><input class="form-control" name="priority" value="{{ task.priority or '' }}"><div class="form-check"><input class="form-check-input" type="checkbox" name="create_as_subtasks" value="true" {% if task.create_as_subtasks %}checked{% endif %}><label class="form-check-label">Режим корневой задачи с подзадачами</label></div><label>Исполнители (поиск браузера Ctrl+F)</label><div class="border p-2">{% set selected=task.assignments|map(attribute='employee_id')|list %}{% for e in employees %}<div class="form-check"><input class="form-check-input" type="checkbox" name="employee_ids" value="{{ e.id }}" {% if e.id in selected %}checked{% endif %}><label>{{ e.full_name }}</label></div>{% endfor %}</div><label>Списки сотрудников</label><select class="form-select" multiple>{% for l in lists %}<option>{{ l.name }}</option>{% endfor %}</select><label>Индивидуальные параметры исполнителей</label><textarea class="form-control" placeholder="Задаются в техническом режиме при необходимости"></textarea><label>Исходный фрагмент</label><textarea class="form-control" name="original_text">{{ task.original_text or '' }}</textarea><button class="btn btn-success mt-3">Сохранить</button></form>{% endblock %}
