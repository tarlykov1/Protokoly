{% extends "base.html" %}{% block content %}<h1>Реестр протоколов</h1><form class="row mb-3"><div class="col"><select class="form-select" name="status"><option value="">Все статусы</option><option value="draft">draft</option><option value="ready">ready</option><option value="validation_required">validation_required</option></select></div><div class="col"><button class="btn btn-outline-primary">Фильтр</button></div></form><table class="table"><tr><th>Дата</th><th>Название</th><th>Номер</th><th>Статус</th></tr>{% for p in protocols %}<tr><td>{{ p.meeting_date or "—" }}</td><td><a href="/protocols/{{ p.id }}">{{ p.title }}</a></td><td>{{ p.number or "—" }}</td><td>{{ p.status }}</td></tr>{% else %}<tr><td colspan="4">Нет протоколов</td></tr>{% endfor %}</table>{% endblock %}
