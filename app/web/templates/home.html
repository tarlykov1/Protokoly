{% extends "base.html" %}{% block content %}<h1>Главная</h1><div class="row g-3"><div class="col"><div class="card"><div class="card-body"><b>{{ draft_count }}</b><br>Черновики</div></div></div><div class="col"><div class="card"><div class="card-body"><b>{{ ready_count }}</b><br>Готовые</div></div></div><div class="col"><div class="card"><div class="card-body"><b>{{ error_count }}</b><br>С ошибками</div></div></div></div><h2 class="mt-4">Последние протоколы</h2><ul>{% for p in protocols %}<li>{{ p.title }} — {{ p.status }}</li>{% else %}<li>Пока нет протоколов.</li>{% endfor %}</ul>{% endblock %}
