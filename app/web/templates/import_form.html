{% extends "base.html" %}{% block content %}<h1>Импорт DOCX</h1><form method="post" action="/protocols/import/preview" enctype="multipart/form-data"><div class="mb-3"><label>Проект</label><select class="form-select" name="project_id">{% for p in projects %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}</select></div><div class="mb-3"><label>Парсер</label><select class="form-select" name="parser_type"><option value="">Авто</option><option value="universal">Universal</option><option value="memo">Memo</option><option value="ceo_protocol">CEO</option><option value="deputy_ceo_protocol">Deputy CEO</option></select></div><input class="form-control" type="file" name="file" accept=".docx" required><button class="btn btn-primary mt-3">Предпросмотр</button></form>{% endblock %}
