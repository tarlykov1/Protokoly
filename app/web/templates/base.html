<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Кабинет протокольных мероприятий</title>
  <style>
    :root{--brand:#172b4d;--soft:#eef3f8;--line:#d9e2ec} body{background:#f6f8fb;color:#243447}.navbar{background:var(--brand)}.hero{background:linear-gradient(135deg,#fff,#eaf1fb);border:1px solid var(--line);border-radius:24px}.card{border:1px solid var(--line);box-shadow:0 8px 24px rgba(23,43,77,.06);border-radius:18px}.btn{border-radius:10px;font-weight:600}.metric{font-size:2rem;font-weight:800}.step{border-left:4px solid var(--line);padding-left:1rem}.step.done{border-color:#198754}.task-tree{border-left:2px solid #9bb4d1;margin-left:1rem;padding-left:1rem}.empty{border:1px dashed #aac0d6;border-radius:18px;background:#fff;padding:2rem;text-align:center}.focus-ring:focus,.btn:focus,.form-control:focus,.form-select:focus{box-shadow:0 0 0 .25rem rgba(13,110,253,.25)}pre{white-space:pre-wrap;word-break:break-word}@media(max-width:576px){.hero{border-radius:16px}.action-row .btn{width:100%;margin-bottom:.5rem}.table-responsive{font-size:.9rem}}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top"><div class="container">
  <a class="navbar-brand fw-bold" href="/">Кабинет протокольных мероприятий</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Открыть меню"><span class="navbar-toggler-icon"></span></button>
  <div id="nav" class="collapse navbar-collapse"><div class="navbar-nav ms-auto gap-lg-2">
    <a class="nav-link" href="/demo">Демо</a><a class="nav-link" href="/demo/dashboard">Панель</a><a class="nav-link" href="/protocols">Протоколы</a><a class="nav-link" href="/protocols/import">Импорт</a><a class="nav-link" href="/publication-runs">Тестовые публикации</a>
    <span class="badge text-bg-warning align-self-lg-center">Демонстрационная версия</span>
  </div></div></div></nav>
<main class="container py-4">{% if message %}<div class="alert alert-info" role="status">{{ message }}</div>{% endif %}{% block content %}{% endblock %}</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
