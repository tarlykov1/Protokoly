server {
  listen 80;
  server_name _;
  client_max_body_size 20m;
  location ~ /\. { deny all; }
  location /static/ { proxy_pass http://app:8000; expires 7d; add_header Cache-Control "public"; }
  location / {
    proxy_pass http://app:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $req_id;
    proxy_read_timeout 120s;
  }
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  error_page 500 502 503 504 /50x.html;
  location = /50x.html { return 503 'Service temporarily unavailable'; }
}
# For HTTPS, mount certs/demo.example.ru/fullchain.pem and privkey.pem, then add a TLS server block and redirect HTTP to HTTPS.
# To enable Basic Auth, create /etc/nginx/auth/.htpasswd and add: auth_basic "Demo"; auth_basic_user_file /etc/nginx/auth/.htpasswd;
